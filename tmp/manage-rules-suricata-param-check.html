<!doctype html>
<html lang="en"><body><pre id="status">Loading…</pre><iframe id="viewer" src="../viewer/viewer.html?manageRulesSuricataParamCheck=1" style="width:1440px;height:1200px;border:0"></iframe><script>
const statusEl = document.getElementById('status');
const frame = document.getElementById('viewer');
let reported = false;
function setStatus(data){statusEl.textContent = JSON.stringify(data,null,2);} 
function reportStatus(data){ if(reported) return; reported = true; const params = new URLSearchParams(); Object.entries(data).forEach(([k,v])=>params.set(k,String(v))); (new Image()).src = `/__codex_suri_param_status__?${params.toString()}`; }
function click(el){ if(!el) return false; el.dispatchEvent(new MouseEvent('click',{bubbles:true,cancelable:true,composed:true})); return true; }
frame.addEventListener('load',()=>{ const win = frame.contentWindow; const doc = win.document; try { if (typeof win.initAlertsFeature === 'function') win.initAlertsFeature(); if (typeof win.openManageModal === 'function') win.openManageModal(null, false); } catch (error) { const payload = { ok:false, phase:'open', error:String(error && error.message || error) }; setStatus(payload); reportStatus(payload); return; }
setTimeout(()=>{ try { const host = doc.getElementById('alertingInlineRoot'); const shadow = host && host.shadowRoot; if(!shadow){ const payload={ok:false, phase:'shadow', error:'missing shadow root'}; setStatus(payload); reportStatus(payload); return; }
const suricataRow = Array.from(shadow.querySelectorAll('.alerting-sidebar .side-row.sidebar-item-row.sidebar-item')).find((row)=>/Emerging Threats PRO/i.test(row.textContent||'')); click(suricataRow);
setTimeout(()=>{ const suriRuleRow = Array.from(shadow.querySelectorAll('#rulesTableBody tr')).find((row)=>/Apache Log4j|Microsoft Exchange|Spring4Shell/i.test(row.textContent||'')); click(suriRuleRow);
setTimeout(()=>{ click(shadow.getElementById('editBtn')); setTimeout(()=>{ const ruleScopeCard = shadow.getElementById('suriCard-ruleScope'); const drawerTitle = shadow.getElementById('drawerTitle')?.textContent?.trim() || ''; const chipboxes = ruleScopeCard ? ruleScopeCard.querySelectorAll('.suri-scope-chipbox').length : 0; const triggers = ruleScopeCard ? ruleScopeCard.querySelectorAll('.suri-scope-picker-trigger').length : 0; const modeToggles = ruleScopeCard ? ruleScopeCard.querySelectorAll('.suri-param-mode-toggle').length : 0; const payload = { ok: chipboxes > 0 && triggers === 0, drawerTitle, chipboxes, triggers, modeToggles }; setStatus(payload); reportStatus(payload); }, 1200); }, 900); }, 1200); } catch(error){ const payload={ok:false, phase:'probe', error:String(error && error.message || error)}; setStatus(payload); reportStatus(payload);} }, 1800); });
</script></body></html>
