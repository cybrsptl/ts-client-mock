<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><title>Manage Rules Projects Check</title></head>
  <body>
    <pre id="status">Loading…</pre>
    <iframe id="viewer" src="../viewer/viewer.html?manageRulesProjectsCheck=1" style="width:1440px;height:1100px;border:0"></iframe>
    <script>
      const statusEl = document.getElementById('status');
      const frame = document.getElementById('viewer');
      let reported = false;
      function setStatus(data) { statusEl.textContent = JSON.stringify(data, null, 2); }
      function reportStatus(data) {
        if (reported) return;
        reported = true;
        const params = new URLSearchParams();
        Object.entries(data).forEach(([key, value]) => params.set(key, String(value)));
        (new Image()).src = `/__codex_icon_table_status__?${params.toString()}`;
      }
      function getHeaderLabels(shadow) {
        return Array.from(shadow.querySelectorAll('#rulesTableHead th .col-header-label')).map((el) => (el.textContent || '').trim()).filter(Boolean);
      }
      frame.addEventListener('load', () => {
        const win = frame.contentWindow;
        const doc = win.document;
        try {
          if (typeof win.initAlertsFeature === 'function') win.initAlertsFeature();
          if (typeof win.openManageModal === 'function') win.openManageModal(null, false);
        } catch (error) {
          const payload = { ok: false, phase: 'open', error: String(error && error.message || error) };
          setStatus(payload); reportStatus(payload); return;
        }
        setTimeout(() => {
          try {
            const host = doc.getElementById('alertingInlineRoot');
            const shadow = host && host.shadowRoot;
            if (!shadow) {
              const payload = { ok: false, phase: 'shadow', error: 'missing shadow root' };
              setStatus(payload); reportStatus(payload); return;
            }
            const sidebarItems = Array.from(shadow.querySelectorAll('.alerting-sidebar .side-row.sidebar-item-row.sidebar-item'));
            const etpRow = sidebarItems.find((row) => /Emerging Threats PRO/i.test(row.textContent || ''));
            const customRow = sidebarItems.find((row) => /Custom Suricata Rules/i.test(row.textContent || ''));
            const variablesRow = Array.from(shadow.querySelectorAll('.alerting-sidebar .side-quick-row.sidebar-item-row.sidebar-item')).find((row) => /Variables/i.test(row.textContent || ''));
            const defaultAlertsRow = sidebarItems.find((row) => /Default Alerts/i.test(row.textContent || ''));
            const etpIconSrc = etpRow?.querySelector('.side-image-icon')?.getAttribute('src') || '';
            const customIconSrc = customRow?.querySelector('.side-image-icon')?.getAttribute('src') || '';

            variablesRow?.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true, composed: true }));
            setTimeout(() => {
              const variableSuricataSrc = shadow.querySelector('.variable-usedby-cell .variable-used-logo')?.getAttribute('src') || '';
              defaultAlertsRow?.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true, composed: true }));
              setTimeout(() => {
                const defaultHeaders = getHeaderLabels(shadow);
                const defaultProjectChipText = shadow.querySelector('#rulesTableBody tr td.col-projects .rule-project-chip')?.textContent?.trim() || '';
                const defaultProjectChipTitle = shadow.querySelector('#rulesTableBody tr td.col-projects .rule-project-chip')?.getAttribute('title') || '';
                etpRow?.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true, composed: true }));
                setTimeout(() => {
                  const suriHeaders = getHeaderLabels(shadow);
                  const suriProjectChipText = shadow.querySelector('#rulesTableBody tr td.col-projects .rule-project-chip')?.textContent?.trim() || '';
                  const suriProjectChipTitle = shadow.querySelector('#rulesTableBody tr td.col-projects .rule-project-chip')?.getAttribute('title') || '';
                  const payload = {
                    ok:
                      /Suricata\.svg$/i.test(etpIconSrc) &&
                      /Suricata\.svg$/i.test(customIconSrc) &&
                      /Suricata\.svg$/i.test(variableSuricataSrc) &&
                      defaultHeaders.join('|') === 'Name|Projects|Total Hits|Status' &&
                      suriHeaders.join('|') === 'Name|Projects|Class|Total Hits|Status' &&
                      !!defaultProjectChipText &&
                      !!defaultProjectChipTitle &&
                      !!suriProjectChipText &&
                      !!suriProjectChipTitle,
                    etpIconSrc,
                    customIconSrc,
                    variableSuricataSrc,
                    defaultHeaders: defaultHeaders.join('|'),
                    suriHeaders: suriHeaders.join('|'),
                    defaultProjectChipText,
                    defaultProjectChipTitle,
                    suriProjectChipText,
                    suriProjectChipTitle
                  };
                  setStatus(payload);
                  reportStatus(payload);
                }, 500);
              }, 500);
            }, 500);
          } catch (error) {
            const payload = { ok: false, phase: 'probe', error: String(error && error.message || error) };
            setStatus(payload); reportStatus(payload);
          }
        }, 1800);
      });
    </script>
  </body>
</html>
