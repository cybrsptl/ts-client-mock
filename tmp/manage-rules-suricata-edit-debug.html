<!doctype html>
<html lang="en"><body><pre id="status">Loading…</pre><iframe id="viewer" src="../viewer/viewer.html?manageRulesSuricataEditDebug=1" style="width:1440px;height:1200px;border:0"></iframe><script>
const statusEl = document.getElementById('status');
const frame = document.getElementById('viewer');
let reported = false;
function setStatus(data){ statusEl.textContent = JSON.stringify(data,null,2); }
function reportStatus(data){ if(reported) return; reported = true; const params = new URLSearchParams(); Object.entries(data).forEach(([k,v])=>params.set(k, typeof v === 'string' ? v : JSON.stringify(v))); (new Image()).src = `/__codex_suri_edit_debug__?${params.toString()}`; }
function click(el){ if(!el) return false; el.dispatchEvent(new MouseEvent('click',{bubbles:true,cancelable:true,composed:true})); return true; }
function classes(el){ return el ? el.className : ''; }
frame.addEventListener('load',()=>{
 const win = frame.contentWindow; const doc = win.document;
 try { if (typeof win.initAlertsFeature === 'function') win.initAlertsFeature(); if (typeof win.openManageModal === 'function') win.openManageModal(null, false); } catch (error) { const payload = { ok:false, phase:'open', error:String(error && error.message || error) }; setStatus(payload); reportStatus(payload); return; }
 setTimeout(()=>{ try {
   const host = doc.getElementById('alertingInlineRoot'); const shadow = host && host.shadowRoot;
   if(!shadow){ const payload={ok:false, phase:'shadow', error:'missing shadow root'}; setStatus(payload); reportStatus(payload); return; }
   const suricataRow = Array.from(shadow.querySelectorAll('.alerting-sidebar .side-row.sidebar-item-row.sidebar-item')).find((row)=>/Emerging Threats PRO/i.test(row.textContent||''));
   click(suricataRow);
   setTimeout(()=>{
     const rows = Array.from(shadow.querySelectorAll('#rulesTableBody tr')).map((row)=>row.textContent.trim()).slice(0,5);
     const suriRuleRow = Array.from(shadow.querySelectorAll('#rulesTableBody tr')).find((row)=>/Apache Log4j|Microsoft Exchange|Spring4Shell/i.test(row.textContent||''));
     click(suriRuleRow);
     setTimeout(()=>{
       const editBtnBefore = shadow.getElementById('editBtn');
       const saveBtnBefore = shadow.getElementById('saveBtn');
       const cancelBtnBefore = shadow.getElementById('cancelBtn');
       const before = {
         drawerTitle: shadow.getElementById('drawerTitle')?.textContent?.trim() || '',
         editBtnText: editBtnBefore?.textContent?.trim() || '',
         editBtnClass: classes(editBtnBefore),
         saveBtnClass: classes(saveBtnBefore),
         cancelBtnClass: classes(cancelBtnBefore),
         cardTitles: Array.from(shadow.querySelectorAll('.suri-card-title')).map((el)=>el.textContent.trim()),
         htmlSnippet: (shadow.getElementById('drawerContent')?.innerHTML || '').slice(0,1200),
         ruleRows: rows
       };
       click(editBtnBefore);
       setTimeout(()=>{
         const editBtnAfter = shadow.getElementById('editBtn');
         const saveBtnAfter = shadow.getElementById('saveBtn');
         const cancelBtnAfter = shadow.getElementById('cancelBtn');
         const ruleScopeCard = shadow.getElementById('suriCard-ruleScope');
         const payload = {
           ok: true,
           before,
           after: {
             drawerTitle: shadow.getElementById('drawerTitle')?.textContent?.trim() || '',
             editBtnClass: classes(editBtnAfter),
             saveBtnClass: classes(saveBtnAfter),
             cancelBtnClass: classes(cancelBtnAfter),
             modeToggleCount: shadow.querySelectorAll('.suri-param-mode-toggle').length,
             chipboxCount: ruleScopeCard ? ruleScopeCard.querySelectorAll('.suri-scope-chipbox').length : -1,
             ruleScopeExists: !!ruleScopeCard,
             cardTitles: Array.from(shadow.querySelectorAll('.suri-card-title')).map((el)=>el.textContent.trim()),
             htmlSnippet: (shadow.getElementById('drawerContent')?.innerHTML || '').slice(0,1800)
           }
         };
         setStatus(payload); reportStatus(payload);
       }, 1200);
     }, 1000);
   }, 1200);
 } catch(error){ const payload={ok:false, phase:'probe', error:String(error && error.message || error)}; setStatus(payload); reportStatus(payload);} }, 1800);
});
</script></body></html>
