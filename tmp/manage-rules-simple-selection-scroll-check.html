<!doctype html>
<html lang="en">
  <body>
    <pre id="status">Loading…</pre>
    <iframe id="viewer" src="../viewer/viewer.html?manageRulesRuleConfigCheck=1" style="width:1440px;height:1400px;border:0"></iframe>
    <script>
      const statusEl = document.getElementById("status");
      const frame = document.getElementById("viewer");
      let reported = false;
      const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
      function setStatus(data) {
        statusEl.textContent = JSON.stringify(data, null, 2);
      }
      function reportStatus(data) {
        if (reported) return;
        reported = true;
        const params = new URLSearchParams();
        Object.entries(data).forEach(([key, value]) => params.set(key, String(value)));
        (new Image()).src = `/__codex_simple_selection_scroll_status__?${params.toString()}`;
      }
      function click(el) {
        if (!el) return false;
        el.dispatchEvent(new MouseEvent("click", { bubbles: true, cancelable: true, composed: true }));
        return true;
      }
      function findSidebarRow(shadow, pattern) {
        return Array.from(shadow.querySelectorAll(".alerting-sidebar .side-row.sidebar-item-row.sidebar-item")).find((row) => pattern.test(row.textContent || ""));
      }
      function findRuleRow(shadow, pattern = null) {
        const rows = Array.from(shadow.querySelectorAll("#rulesTableBody tr"));
        if (!pattern) return rows[0] || null;
        return rows.find((row) => pattern.test(row.textContent || "")) || null;
      }
      async function getModalRoot(doc) {
        const host = doc.getElementById("alertingInlineRoot");
        if (!host) return null;
        for (let index = 0; index < 20; index += 1) {
          const iframe = host.querySelector("iframe.alerting-inline-frame");
          const modalDoc = iframe && iframe.contentDocument;
          if (modalDoc && modalDoc.querySelector(".alerting-sidebar")) return modalDoc;
          await sleep(250);
        }
        return null;
      }
      function getOpenSourceSubnetsMenu(shadow) {
        return shadow.querySelector('.suri-menu[data-menu-key="scope:subnet:sourceSubnets:picker"]');
      }
      function getSelectableRows(menu) {
        return Array.from(menu?.querySelectorAll(".suri-subnet-project-option:not(.is-mode-utility)") || []);
      }
      function getRowValue(row) {
        return String(row?.querySelector(".value")?.textContent || "").trim();
      }
      function clickRowModeButton(menu, value, mode = "include") {
        const row = getSelectableRows(menu).find((item) => getRowValue(item) === value);
        const button = row?.querySelector(mode === "exclude" ? ".suri-item-action-button.is-exclude" : ".suri-item-action-button.is-include");
        return click(button);
      }
      async function waitForMenu(shadow) {
        for (let index = 0; index < 20; index += 1) {
          const menu = getOpenSourceSubnetsMenu(shadow);
          if (menu?.querySelector(".suri-subnet-project-option")) return menu;
          await sleep(200);
        }
        return null;
      }
      frame.addEventListener("load", async () => {
        const win = frame.contentWindow;
        const doc = win.document;
        try {
          if (typeof win.initAlertsFeature === "function") win.initAlertsFeature();
          if (typeof win.openManageModal === "function") win.openManageModal(null, false);
          await sleep(700);
          const shadow = await getModalRoot(doc);
          if (!shadow) {
            const payload = { ok: false, phase: "modal-root", error: "missing shadow root" };
            setStatus(payload);
            reportStatus(payload);
            return;
          }

          click(findSidebarRow(shadow, /Emerging Threats PRO/i));
          await sleep(700);
          click(findRuleRow(shadow, /Apache Log4j|Microsoft Exchange|Spring4Shell/i));
          await sleep(700);
          click(shadow.getElementById("editBtn"));
          await sleep(900);

          const scopeCard = shadow.getElementById("suriCard-ruleScope");
          const sourceSubnetsRow = Array.from(scopeCard?.querySelectorAll(".suri-row") || []).find((row) => /Source Subnets/i.test(row.textContent || ""));
          const sourceSubnetsTrigger = sourceSubnetsRow?.querySelector(".suri-madlib-trigger");
          click(sourceSubnetsTrigger);
          await sleep(600);

          const menu = await waitForMenu(shadow);
          if (!menu) {
            const payload = { ok: false, phase: "menu-open", error: "missing source subnets menu" };
            setStatus(payload);
            reportStatus(payload);
            return;
          }

          const initialValues = getSelectableRows(menu)
            .map(getRowValue)
            .filter(Boolean)
            .slice(0, 13);

          if (initialValues.length < 13) {
            const payload = { ok: false, phase: "options", error: "not enough subnet options", initialValues };
            setStatus(payload);
            reportStatus(payload);
            return;
          }

          for (let index = 0; index < 12; index += 1) {
            const currentMenu = getOpenSourceSubnetsMenu(shadow);
            const value = initialValues[index];
            clickRowModeButton(currentMenu, value, "include");
            await sleep(350);
          }

          await sleep(700);
          let selectionShell = shadow.querySelector('[data-simple-selection-key="scope-sourceSubnets-subnet"]');
          const beforeMaxTop = selectionShell ? Math.max(0, selectionShell.scrollHeight - selectionShell.clientHeight) : 0;
          const beforeClientHeight = selectionShell ? Math.round(selectionShell.clientHeight) : 0;
          const beforeScrollHeight = selectionShell ? Math.round(selectionShell.scrollHeight) : 0;
          const beforeScrollTop = selectionShell ? Math.round(selectionShell.scrollTop) : 0;

          if (!selectionShell || beforeScrollHeight <= beforeClientHeight) {
            const payload = {
              ok: false,
              phase: "overflow",
              error: "selection shell did not overflow",
              beforeClientHeight,
              beforeScrollHeight,
              beforeScrollTop
            };
            setStatus(payload);
            reportStatus(payload);
            return;
          }

          selectionShell.scrollTop = 0;
          await sleep(100);
          const scrolledTop = Math.round(selectionShell.scrollTop);

          const finalValue = initialValues[12];
          const finalMenu = getOpenSourceSubnetsMenu(shadow);
          clickRowModeButton(finalMenu, finalValue, "include");
          await sleep(700);

          selectionShell = shadow.querySelector('[data-simple-selection-key="scope-sourceSubnets-subnet"]');
          const afterClientHeight = selectionShell ? Math.round(selectionShell.clientHeight) : 0;
          const afterScrollHeight = selectionShell ? Math.round(selectionShell.scrollHeight) : 0;
          const afterScrollTop = selectionShell ? Math.round(selectionShell.scrollTop) : 0;
          const afterMaxTop = selectionShell ? Math.max(0, selectionShell.scrollHeight - selectionShell.clientHeight) : 0;

          const payload = {
            ok:
              beforeClientHeight <= 160 &&
              beforeScrollHeight > beforeClientHeight &&
              scrolledTop === 0 &&
              afterClientHeight <= 160 &&
              afterScrollHeight > afterClientHeight &&
              afterScrollTop >= afterMaxTop - 2 &&
              afterScrollTop > 0,
            beforeClientHeight,
            beforeScrollHeight,
            beforeScrollTop,
            scrolledTop,
            afterClientHeight,
            afterScrollHeight,
            afterScrollTop,
            afterMaxTop,
            finalValue
          };
          setStatus(payload);
          reportStatus(payload);
        } catch (error) {
          const payload = { ok: false, phase: "probe", error: String(error && error.message || error) };
          setStatus(payload);
          reportStatus(payload);
        }
      });
    </script>
  </body>
</html>
